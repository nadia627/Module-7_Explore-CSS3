<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation and bounce effect</title>
    <style>
        @keyframes sliding {
            0%{
                background-color: crimson;
                left: 0;
                top: 0;
                /* transform: scale(.5); */
            }
            25%{
                top: 246px;
                background-color: darkslategrey;
                transform: scale(.5);
            }
            50%{
                top: 0px;
                background-color: beige;
            }
            75%{
                top: 246px;
                background-color: chartreuse;
                transform: scale(.5);
            }
            100%{
                background-color: rgb(54, 9, 219);
                left: 527.5px;
                top: 0px;
            } 
            /* from{
                background-color: crimson;
                left: 0;
            }
            to{
                background-color: rgb(238, 255, 0);
                left: 327.5px;
            } */
        }
        .stage{
            width: 600px;
            height: 300px;
            background-color: aquamarine;
        }
        .ball{
            width: 70px;
            height: 70px;
            border-radius: 50%;
            position: relative;
            background-color: crimson;
            animation: sliding 2.5s ease-in-out 0.5s infinite alternate ;
            animation-play-state: running;
        }
    </style>
</head>
<body>
    <h1>Lets explore animation</h1>
    <div class="stage">
        <div class="ball"></div>
    </div>
</body>
</html>
