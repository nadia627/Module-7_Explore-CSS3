<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 150px;
            height: 150px;
            margin-left: 50px;
            margin-bottom: 5px;
            border: 4px solid rgb(14, 13, 13);
           background-color: rgb(248, 107, 51);
        }
        .inner{
            width: 100px;
            height: 100px;
            padding-left: 10px;
            padding-top: 30px;
            /* margin: 35px 0 0 37px; */
            border: 4px solid rgb(220, 235, 10);
            background-color: rgb(248, 241, 247);
            /* transform: scale(0.75);
            transform: rotate(30deg); */
            transform: translate(75px,25px) scale(0.65) rotate(45deg);
            text-align: center;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <h1>Transforming element</h1>
    <div class="box container">
        <div class="inner">box-1</div>
    </div>
    <div class="box container">
        <div class="inner">box-2</div>
    </div>
    <div class="box container">
        <div class="inner">box-3</div>
    </div>
</body>
</html>
